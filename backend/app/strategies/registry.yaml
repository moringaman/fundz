# ─────────────────────────────────────────────────────────────────────────────
# Strategy Registry
# =================
# Single source of truth for all trading strategies.
# Consumed by:
#   • /api/strategies  (served to UI)
#   • agent_scheduler  (STRATEGY_PROFILES, _BOOTSTRAP_RR)
#   • strategy_review  (all_strategies pool)
#   • trader_service   (LLM prompt descriptions)
#   • indicators       (signal routing key)
#
# To add a new strategy: add an entry here, implement _<key>_signals() in
# indicators.py, and add a dispatch branch in generate_signal(). No other
# files need editing.
# ─────────────────────────────────────────────────────────────────────────────

strategies:

  momentum:
    label: "Momentum"
    description: "Follows strong directional moves using RSI + MACD + SMA alignment. Best in clearly trending markets."
    ai_guidance: |
      Momentum agents ride strong trends. Only trade when RSI is not extreme (30-70), 
      price is above SMA20 and SMA50 for longs, and MACD histogram is positive.
      Best in trending_up or trending_down regimes. Avoid ranging markets.
      # , the R:R must be at least 3:1 or the fee drag sinks us — TP kept wide intentionally.
    market_conditions: ["trending_up", "trending_down"]
    avoid_conditions: ["ranging"]
    timeframes:
      default: "15m"
      allowed: ["15m", "30m", "1h"]
    risk:
      stop_loss_pct: 2.0
      take_profit_pct: 7.5
      trailing_stop_pct: 3.5
    indicators:
      rsi_period: 14
      rsi_overbought: 68
      rsi_oversold: 32
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
    agent_naming: ["BTC_Momentum", "ETH_Momentum", "SOL_Momentum_Bull"]
    ai_propose: true
    require_marina: false

  ema_crossover:
    label: "EMA Crossover"
    description: "Trades EMA 9/21 golden/death crossovers with RSI and MACD confluence filters. Fewer but higher-conviction signals than momentum."
    ai_guidance: |
      EMA Crossover agents enter on a confirmed EMA 9 / 21 crossover.
      Golden cross (EMA9 crosses above EMA21) = buy signal.
      Death cross (EMA9 crosses below EMA21) = sell signal.
      RSI filter: do not buy if RSI > 60, do not sell if RSI < 40.
      MACD histogram confirms direction.
      Best in trending markets. Generates false signals in ranging / sideways markets.
      # , tightened RSI to 60/40 — the 65/35 was letting in too many whipsaws.
      # SL tightened and TP widened so a single winner pays for 3-4 losers.
    market_conditions: ["trending_up", "trending_down"]
    avoid_conditions: ["ranging"]
    timeframes:
      default: "1h"
      allowed: ["15m", "30m", "1h", "4h"]
    risk:
      stop_loss_pct: 2.0
      take_profit_pct: 7.5
      trailing_stop_pct: 3.0
    indicators:
      ema_fast: 9
      ema_slow: 21
      rsi_period: 14
      rsi_overbought: 60
      rsi_oversold: 40
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
    agent_naming: ["BTC_EMA_Cross", "ETH_EMA_Signal", "SOL_EMA_Trend"]
    ai_propose: true
    require_marina: false

  mean_reversion:
    label: "Mean Reversion"
    description: "Buys oversold / sells overbought extremes using Bollinger Bands + RSI. Best in sideways, ranging markets."
    ai_guidance: |
      Mean reversion agents trade price returning to average.
      Buy when price touches or breaks below the lower Bollinger Band and RSI < 25.
      Sell when price touches or breaks above the upper Bollinger Band and RSI > 75.
      Best in ranging or low-volatility markets. Dangerous in strong trends.
      # , the old 4.5% TP was barely covering fees after two round trips.
      # RSI extremes tightened to 25/75 — only the real outliers deserve a trade.
    market_conditions: ["ranging", "low_volatility"]
    avoid_conditions: ["trending_up", "trending_down"]
    timeframes:
      default: "1h"
      allowed: ["15m", "30m", "1h", "4h"]
    risk:
      stop_loss_pct: 3.0
      take_profit_pct: 6.0
      trailing_stop_pct: 2.5
    indicators:
      bb_period: 20
      bb_std: 2.0
      rsi_period: 14
      rsi_overbought: 75
      rsi_oversold: 25
    agent_naming: ["BTC_Reversion", "ETH_MeanRev", "SOL_Bounce"]
    ai_propose: true
    require_marina: false

  breakout:
    label: "Breakout"
    description: "Detects and trades range breakouts confirmed by ATR and volume. Targets explosive moves."
    ai_guidance: |
      Breakout agents enter when price breaks decisively beyond a key level.
      Bullish breakout: price closes above upper Bollinger Band with ATR expanding.
      Bearish breakout: price closes below lower Bollinger Band with ATR expanding.
      Require ATR > 1.5× recent average to confirm volatility expansion.
      Best after a period of consolidation. Avoid if already in a mature trend.
      Do NOT trade breakouts in ranging markets — BB band touches in a range are fakeouts, not breakouts.
    market_conditions: ["consolidating", "pre_breakout"]
    avoid_conditions: ["ranging"]
    timeframes:
      default: "1h"
      allowed: ["30m", "1h", "4h"]
    risk:
      stop_loss_pct: 3.0
      take_profit_pct: 7.5
      trailing_stop_pct: 4.0
    indicators:
      atr_period: 14
      atr_multiplier: 1.5
      bb_period: 20
      lookback_period: 20
    agent_naming: ["BTC_Breakout", "ETH_Surge", "SOL_Breakout"]
    ai_propose: true
    require_marina: false

  trend_following:
    label: "Trend Following"
    description: "Rides sustained multi-hour or multi-day trends using SMA 20/50 crossover with MACD confirmation."
    ai_guidance: |
      Trend following agents hold positions for extended periods.
      Long when SMA20 > SMA50 and price is above both. Short when SMA20 < SMA50.
      Wide stops (3.0%) and large targets (9%+) to accommodate noise.
      Trailing stop at 5% to capture most of the trend.
      Best for major pairs (BTCUSDT, ETHUSDT) on higher timeframes.
    market_conditions: ["trending_up", "trending_down"]
    avoid_conditions: ["ranging"]
    timeframes:
      default: "4h"
      allowed: ["1h", "4h", "1d"]
    risk:
      stop_loss_pct: 3.0
      take_profit_pct: 9.0
      trailing_stop_pct: 5.0
    indicators:
      sma_fast: 20
      sma_slow: 50
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      atr_period: 14
    agent_naming: ["BTC_Trend", "ETH_TrendRider", "Macro_Trend"]
    ai_propose: true
    require_marina: false

  scalping:
    label: "Scalping"
    description: "Fast in-and-out trades on small moves using EMA 9/21 and RSI on short timeframes."
    ai_guidance: |
      Scalping agents make many small trades with tight stops.
      Use EMA 9/21 crossovers on 1m-15m charts.
      RSI overbought: 60, oversold: 40 (tighter thresholds — scalp fees are brutal at 0.6% round-trip).
      Only trade during high-volume periods. Avoid news events.
      Keep position sizes smaller than other strategies due to high trade frequency.
      # , the old 2.5% TP barely left a doubloon after fees. Raised to 3.5% so the haul justifies the voyage.
    market_conditions: ["trending_up", "trending_down", "ranging"]
    avoid_conditions: []
    timeframes:
      default: "5m"
      allowed: ["1m", "5m", "15m"]
    risk:
      stop_loss_pct: 1.0
      take_profit_pct: 3.5
      trailing_stop_pct: 1.5
    indicators:
      ema_fast: 9
      ema_slow: 21
      rsi_period: 7
      rsi_overbought: 60
      rsi_oversold: 40
    agent_naming: ["BTC_Scalp", "ETH_Scalp", "SOL_Scalper"]
    ai_propose: true
    require_marina: false

  grid:
    label: "Grid"
    description: "Systematic buy/sell at fixed price intervals within a Bollinger Band range. Designed for sideways markets."
    ai_guidance: |
      Grid agents do NOT use directional SL/TP in the traditional sense.
      They place a grid of buy and sell orders at equal intervals within the BB range.
      Only propose grid when: BB width is narrow, ATR is low, market regime is ranging.
      Use stop_loss_pct: 3.0, take_profit_pct: 6.0 as grid-exit thresholds.
      Grid levels: 10 default. Timeframe: 15m.
      Do NOT propose grid in trending markets — it will suffer heavy losses.
    market_conditions: ["ranging", "low_volatility"]
    avoid_conditions: ["trending_up", "trending_down"]
    timeframes:
      default: "15m"
      allowed: ["5m", "15m", "30m", "1h"]
    risk:
      stop_loss_pct: 3.0
      take_profit_pct: 6.0
      trailing_stop_pct: null
    indicators:
      bb_period: 20
      bb_std: 2.0
      atr_period: 14
      grid_levels: 10
    agent_naming: ["BTC_Grid", "ETH_Grid", "SOL_Grid"]
    ai_propose: false
    require_marina: true

  wyckoff:
    label: "Wyckoff Intraday"
    description: "Intraday Wyckoff liquidity-sweep strategy. Establishes the session Initial Balance (first 2h), then trades Phase C Springs (long) and Upthrusts (short) — price dips below/above the IB boundary and immediately reclaims it. Ignores mid-range noise."
    ai_guidance: |
      Wyckoff intraday agents trade liquidity sweeps against the day's Initial Balance (IB).
      The IB is the high and low of the first 2 hours of the UTC session.
      PHASE B (wait): price is inside the IB range. Do NOT trade. Wait.
      PHASE C — Spring (long): price briefly dips below IB low by < 1%, then closes back above it.
        Entry: at the reclaim of IB low. SL: below the sweep low. TP: IB high.
      PHASE C — Upthrust (short): price briefly pokes above IB high by < 1%, then closes back below it.
        Entry: at the rejection below IB high. SL: above the sweep high. TP: IB low.
      Effort vs. Result filter: only enter if the reversal candle volume >= 80% of the sweep candle volume.
      Low-volume sweeps are often noise, not genuine absorption.
      # , the stateless recalculation is good enough for a sanity test.
      # The proper fix be a per-agent session state store (see ROADMAP comment in _wyckoff_signals).
    market_conditions: ["trending_up", "trending_down", "ranging", "volatile"]
    avoid_conditions: []
    timeframes:
      default: "5m"
      allowed: ["5m", "15m"]
    risk:
      stop_loss_pct: 1.5
      take_profit_pct: 4.0
      trailing_stop_pct: null
    indicators:
      ib_window_minutes: 120
      sweep_max_depth_pct: 1.0
      reversal_volume_ratio: 0.8
    agent_naming: ["BTC_Wyckoff", "ETH_Wyckoff", "SOL_Wyckoff"]
    ai_propose: true
    require_marina: false

  ai:
    label: "AI Strategy"
    description: "LLM-powered analysis and signals. The AI considers all available indicators, whale data, market regime and team context to generate decisions."
    ai_guidance: |
      AI strategy agents use the full LLM pipeline for each signal.
      The LLM receives all technical indicators, market regime, whale intelligence,
      team analysis context, and the trader's persona/style.
      Can adapt to any market condition but uses more API calls per cycle.
      Best for pairs where market conditions are unclear or mixed signals exist.
    market_conditions: ["trending_up", "trending_down", "ranging", "volatile"]
    avoid_conditions: []
    timeframes:
      default: "1h"
      allowed: ["5m", "15m", "30m", "1h", "4h", "1d"]
    risk:
      stop_loss_pct: 2.0
      take_profit_pct: 7.5
      trailing_stop_pct: 3.0
    indicators: {}
    agent_naming: ["BTC_AI_Agent", "ETH_Intelligence", "AI_Macro"]
    ai_propose: true
    require_marina: false

  fractal:
    label: "Fractal Breakout"
    description: "Bill Williams 5-bar fractal breakouts. Enters when price closes through a confirmed structural swing level, filtered by ADX trend strength and volume."
    ai_guidance: |
      Fractal breakout agents enter when price closes ABOVE the most recent bearish
      fractal high (long) or BELOW the most recent bullish fractal low (short).
      A fractal only confirms 2 bars after the swing bar closes — no look-ahead.
      ADX > 25 required for full confidence; ADX < 15 reduces confidence (ranging fakeout risk).
      Volume >= 1.5x average adds further conviction.
      Stop placed at the opposing fractal (structural invalidation), not a fixed %.
      Best in trending markets with clear swing structure.
      # , fractal stops are tighter than % stops in trending markets — the structure
      # tells ye where yer wrong, not an arbitrary number.
    market_conditions: ["trending_up", "trending_down"]
    avoid_conditions: ["ranging"]
    timeframes:
      default: "1h"
      allowed: ["15m", "30m", "1h", "4h"]
    risk:
      stop_loss_pct: 2.5
      take_profit_pct: 7.5
      trailing_stop_pct: 3.5
    indicators:
      fractal_n: 2
      adx_period: 14
      adx_trend_threshold: 25
      adx_ranging_threshold: 15
      volume_confirmation_ratio: 1.5
    agent_naming: ["BTC_Fractal", "ETH_Fractal", "SOL_Fractal"]
    ai_propose: true
    require_marina: false
