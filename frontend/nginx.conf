server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Railway's internal DNS resolver. Using a variable in proxy_pass defers
    # hostname resolution to request time (not startup), so nginx starts even
    # if the backend isn't up yet. Also prevents crashes when BACKEND_HOST
    # is a private .railway.internal hostname that isn't in /etc/hosts.
    # valid=30s reduces re-resolution frequency (reduces ETIMEDOUT under load).
    # resolver_timeout gives Railway's DNS more time to respond.
    resolver 100.100.100.100 valid=30s ipv6=off;
    resolver_timeout 15s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dedicated WebSocket location — must come before the generic /api/ block
    location /api/ws/ {
        set $backend http://${BACKEND_HOST}:8000;
        proxy_pass $backend/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WS connections alive; default 60s would kill long-lived sockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
    }

    location /api/ {
        set $backend http://${BACKEND_HOST}:8000;
        proxy_pass $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
