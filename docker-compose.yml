services:
  db:
    image: postgres:15-alpine
    container_name: phemex-ai-trader-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phemex_ai_trader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phemex-ai-trader-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phemex-ai-trader-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/phemex_ai_trader
      REDIS_URL: redis://redis:6379/0
      MAIL_SERVER_DOMAIN: wx-microservice-email.herokuapp.com
      MAIL_SERVER_API_KEY: 1ab2c3d4e5f61ab2c3d4e5f6
      MAIL_TO_ADDRESS: trading@webnostix.co.uk
      MAIL_FROM_ADDRESS: trading@phemex-ai-trader.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phemex-ai-trader-frontend
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: /api
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    command: nginx -g 'daemon off;'

volumes:
  postgres_data:
